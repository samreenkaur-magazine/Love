<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love You</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #FFC568, #ffdca8);
  font-family: "Segoe UI", sans-serif;
  overflow: hidden;
}

/* background */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* 🌷 PLANT (REAL GROW FROM GROUND FIX) */
.plant {
  position: absolute;
  bottom: 0;
  width: 10vw;

  height: 0;                /* 🔥 start invisible */
  opacity: 0;
  overflow: visible;

  transform-origin: bottom;

  animation: growPlant 1.8s ease-out forwards, sway 6s ease-in-out infinite;
}

@keyframes growPlant {
  0% {
    height: 0;
    opacity: 0;
    transform: translateY(20px);
  }
  60% {
    opacity: 1;
  }
  100% {
    height: 40vh;
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes sway {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}

/* stem */
.stem {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 3px;
  height: 100%;
  background: #5fbf6a;
  transform: translateX(-50%);
}

/* leaves */
.leaf {
  position: absolute;
  width: 2vh;
  height: 2vh;
  background: #4caf50;
  border-radius: 70% 0 70% 0;
}

.leaf.left {
  left: -2vh;
  top: 40%;
  transform: rotate(-45deg);
}

.leaf.right {
  right: -2vh;
  top: 60%;
  transform: rotate(45deg);
}

/* flower */
.flower {
  position: absolute;
  top: -4vh;
  left: 50%;
  transform: translateX(-50%);
  font-size: 4vh;
}

/* center layout */
.container {
  text-align: center;
  position: relative;
  z-index: 2;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  padding-top: 8vh;
}

.typing {
  font-size: 6vw;
  font-weight: bold;
  color: #763C8C;
  white-space: nowrap;
  border-right: 2px solid #763C8C;
}

.name {
  font-size: 5vw;
  margin-top: 1vh;
  color: #5a2d6d;
}

.message-card {
  margin-top: 3vh;
  padding: 4vw;
  width: 80vw;
  max-width: 340px;

  background: rgba(255, 255, 255, 0.10);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(2px);
  border-radius: 15px;

  font-size: 3.8vw;
  line-height: 1.7;
  color: #2b2b2b;
  text-align: center;
}

.signature {
  margin-top: 2vh;
  font-weight: bold;
  font-size: 4vw;
  color: #763C8C;
  text-align: center;
}

/* hearts */
.heart {
  position: absolute;
  color: #fa4843;
  animation: float 8s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-700px); opacity: 0; }
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="container">
  <div class="typing" id="typing"></div>
  <div class="name">My Buggu 💜</div>

  <div class="message-card">
    You are my everything 💜<br>
    Khush reha kar baby ❤️<br><br>

    💋💋<br>
    I miss you 💋<br>

    <div class="signature">
      ❤️ Sami ❤️
    </div>
  </div>
</div>

<script>

// hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";

  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.fontSize = (Math.random() * 15 + 10) + "px";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 800);


// 🌷 REAL GROW FLOWERS FIXED
const bg = document.getElementById("bg");
let lastX = 0;

function createPlant() {
  let x;
  do {
    x = Math.random() * window.innerWidth;
  } while (Math.abs(x - lastX) < 80);

  lastX = x;

  const plant = document.createElement("div");
  plant.className = "plant";
  plant.style.left = x + "px";

  const stem = document.createElement("div");
  stem.className = "stem";

  const leaf1 = document.createElement("div");
  leaf1.className = "leaf left";

  const leaf2 = document.createElement("div");
  leaf2.className = "leaf right";

  const flower = document.createElement("div");
  flower.className = "flower";
  flower.innerHTML = ["🌷","🌸","🌼","🌺","🌹"][Math.floor(Math.random()*5)];

  stem.appendChild(leaf1);
  stem.appendChild(leaf2);
  stem.appendChild(flower);

  plant.appendChild(stem);
  bg.appendChild(plant);

  setTimeout(() => plant.remove(), 12000);
}

setInterval(createPlant, 2000);


// typing
const text = "I LOVE YOU";
const typingEl = document.getElementById("typing");

let i = 0;
let deleting = false;

function typeLoop() {
  if (!deleting) {
    typingEl.textContent = text.slice(0, i++);
    if (i > text.length) {
      deleting = true;
      setTimeout(typeLoop, 1500);
      return;
    }
  } else {
    typingEl.textContent = text.slice(0, i--);
    if (i < 0) {
      deleting = false;
      i = 0;
    }
  }

  setTimeout(typeLoop, deleting ? 180 : 220);
}

typeLoop();

</script>

</body>
</html>
