<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love You</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #FFC568, #ffdca8);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Segoe UI", sans-serif;
  overflow: hidden;
}

/* Background */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* 🌿 PLANT */
.plant {
  position: absolute;
  bottom: -150px;
  width: 30px;
  height: 140px;
  transform-origin: bottom center;
  animation: rise 2.8s ease-out forwards, sway 6s ease-in-out infinite;
}

@keyframes rise {
  from { bottom: -150px; }
  to { bottom: 0px; }
}

@keyframes sway {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}

/* stem */
.stem {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 2px;
  height: 120px;
  background: #5fbf6a;
  transform: translateX(-50%);
}

/* leaves */
.leaf {
  position: absolute;
  width: 13px;
  height: 13px;
  background: #4caf50;
  border-radius: 70% 0 70% 0;
}

.leaf.left {
  left: -10px;
  top: 45px;
  transform: rotate(-45deg);
}

.leaf.right {
  right: -10px;
  top: 70px;
  transform: rotate(45deg);
}

/* flower */
.flower {
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
}

/* UI */
.container {
  text-align: center;
  position: relative;
  z-index: 2;
}

.typing {
  font-size: 48px;
  font-weight: bold;
  color: #763C8C;
  white-space: nowrap;
  overflow: hidden;
  border-right: 3px solid #763C8C;
}

.name {
  font-size: 30px;
  margin-top: 10px;
  color: #5a2d6d;
}

/* message */
.message-card {
  margin-top: 30px;
  padding: 18px;
  width: 320px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(2px);
  border-radius: 15px;
  font-size: 15px;
  line-height: 1.7;
  color: #2b2b2b;
  text-align: left;
}

/* signature */
.signature {
  margin-top: 12px;
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  color: #763C8C;
}

/* hearts */
.heart {
  position: absolute;
  color: #fa4843;
  animation: float 8s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-700px); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9c6b5c0c9c.mp3?filename=romantic-piano-ambient-110397.mp3" type="audio/mpeg">
</audio>

<div class="bg" id="bg"></div>

<div class="container">
  <div class="typing" id="typing"></div>
  <div class="name">My Buggu 💜</div>

  <div class="message-card">
    You are my everything 💜  
    Khush reha kar baby ❤️  

    💋💋  
    I miss you 💋  

    <div class="signature">
      ❤️ Sami ❤️
    </div>
  </div>
</div>

<script>

// 🎵 music play (browser safe)
const music = document.getElementById("bgMusic");

function playMusic() {
  music.volume = 0.4;
  music.play().catch(() => {
    // fallback: play on first click
    document.body.addEventListener("click", () => {
      music.play();
    }, { once: true });
  });
}
playMusic();


// ❤️ hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";

  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.fontSize = (Math.random() * 15 + 10) + "px";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 800);


// 🌿 plants
const bg = document.getElementById("bg");
let lastX = 0;

function createPlant() {
  let x;
  do {
    x = Math.random() * window.innerWidth;
  } while (Math.abs(x - lastX) < 90);

  lastX = x;

  const plant = document.createElement("div");
  plant.className = "plant";
  plant.style.left = x + "px";

  const stem = document.createElement("div");
  stem.className = "stem";

  const leaf1 = document.createElement("div");
  leaf1.className = "leaf left";

  const leaf2 = document.createElement("div");
  leaf2.className = "leaf right";

  const flower = document.createElement("div");
  flower.className = "flower";
  flower.innerHTML = ["🌷","🌸","🌼","🌺","🌹"][Math.floor(Math.random()*5)];

  stem.appendChild(leaf1);
  stem.appendChild(leaf2);
  stem.appendChild(flower);

  plant.appendChild(stem);
  bg.appendChild(plant);

  setTimeout(() => plant.remove(), 12000);
}

setInterval(createPlant, 2000);


// ⌨️ typing
const text = "I LOVE YOU";
const typingEl = document.getElementById("typing");

let i = 0;
let deleting = false;

function typeLoop() {
  if (!deleting) {
    typingEl.textContent = text.slice(0, i++);
    if (i > text.length) {
      deleting = true;
      setTimeout(typeLoop, 1500);
      return;
    }
  } else {
    typingEl.textContent = text.slice(0, i--);
    if (i < 0) {
      deleting = false;
      i = 0;
    }
  }

  setTimeout(typeLoop, deleting ? 180 : 220);
}

typeLoop();

</script>

</body>
</html>
