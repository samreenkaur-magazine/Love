<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love You Animation</title>

<script src="https://cdn.jsdelivr.net/npm/@mojs/core"></script>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #FFC568;
  font-family: Arial, sans-serif;
}

.container {
  width: 500px;
  height: 200px;
  position: relative;
}

.svg-container {
  position: absolute;
  z-index: 2;
}

.mo-container {
  width: 100%;
  height: 100%;
}

.line {
  fill: none;
  stroke: #FFFFFF;
  stroke-width: 8;
  stroke-linecap: round;
}

.lttr {
  fill: #763C8C;
  opacity: 1;
}

.sound {
  position: fixed;
  bottom: 10px;
  right: 10px;
  color: #763C8C;
  cursor: pointer;
  text-decoration: underline;
}

.sound--off {
  text-decoration: line-through;
}
</style>
</head>

<body>

<div class="container">
  <svg class="svg-container" viewBox="0 0 500 200">
    <line class="line line--left" x1="10" y1="17" x2="10" y2="183"/>
    <line class="line line--rght" x1="490" y1="17" x2="490" y2="183"/>

    <g>
      <path class="lttr lttr--I" d="M42.2,73.9h11.4v52.1H42.2z"/>
      <path class="lttr lttr--L" d="M85.1,73.9h11.4v42.1h22.8v10H85.1z"/>
      <path class="lttr lttr--O" d="M123.9,100c0-15.2,11.7-26.9,27.2-26.9s27.2,11.7,27.2,26.9s-11.7,26.9-27.2,26.9S123.9,115.2,123.9,100z"/>
      <path class="lttr lttr--V" d="M180.7,73.9H193l8.4,22.9c1.7,4.7,3.5,9.5,5,14.2h0.1c1.7-4.8,3.4-9.4,5.2-14.3l8.6-22.8h11.7l-19.9,52.1h-11.5z"/>
      <path class="lttr lttr--E" d="M239.1,73.9h32.2v10h-20.7v10.2h17.9v9.5h-17.9v12.4H272v10h-33z"/>
      <path class="lttr lttr--Y" d="M315.8,102.5l-20.1-28.6H309l6.3,9.4c2,3,4.2,6.4,6.3,9.6h0.1c2-3.2,4.1-6.4,6.3-9.6l6.3-9.4h12.9l-19.9,28.5v23.6h-11.4z"/>
      <path class="lttr lttr--O2" d="M348.8,100c0-15.2,11.7-26.9,27.2-26.9c15.5,0,27.2,11.7,27.2,26.9s-11.7,26.9-27.2,26.9C360.5,126.9,348.8,115.2,348.8,100z"/>
      <path class="lttr lttr--U" d="M412.4,101.1V73.9h11.4v26.7c0,10.9,2.4,15.9,11.5,15.9c8.4,0,11.4-4.6,11.4-15.8V73.9h11v26.9c0,7.8-1.1,13.5-4,17.7c-3.7,5.3-10.4,8.4-18.7,8.4c-8.4,0-15.1-3.1-18.8-8.5C413.4,114.2,412.4,108.5,412.4,101.1z"/>
    </g>
  </svg>

  <div class="mo-container"></div>
</div>

<div class="sound">sound</div>

<script>
const qs = document.querySelector.bind(document);

const el = {
  container: qs('.mo-container'),
  letters: document.querySelectorAll('.lttr'),
  lineLeft: qs('.line--left'),
  lineRight: qs('.line--rght'),
  colTxt: "#763c8c",
  colHeart: "#fa4843"
};

// Custom heart
class Heart extends mojs.CustomShape {
  getShape() {
    return '<path d="M50,88.9C25.5,78.2,0.5,54.4,3.8,31.1S41.3,1.8,50,29.9c8.7-28.2,42.8-22.2,46.2,1.2S74.5,78.2,50,88.9z"/>';
  }
}
mojs.addShape('heart', Heart);

// Timeline
const tl = new mojs.Timeline();

// Letters stagger animation (same feel)
const lettersAnim = new mojs.Stagger(mojs.Html)({
  el: '.lttr',
  duration: 800,
  delay: 200,
  opacity: {0: 1},
  y: {40: 0},
  easing: 'cubic.out'
});

// Lines animation
const lineL = new mojs.Html({
  el: el.lineLeft,
  x: {0: 60},
  duration: 1200,
  easing: 'sin.inOut'
});

const lineR = new mojs.Html({
  el: el.lineRight,
  x: {0: -60},
  duration: 1200,
  easing: 'sin.inOut'
});

// Heart bounce animation
const heart = new mojs.Shape({
  parent: el.container,
  shape: 'heart',
  fill: el.colHeart,
  scale: {0: 1},
  x: 0,
  duration: 800,
  easing: 'elastic.out'
});

// Burst effect (important for realism)
const burst = new mojs.Burst({
  parent: el.container,
  radius: {20: 100},
  count: 6,
  children: {
    shape: 'circle',
    fill: el.colTxt,
    scale: {1: 0},
    duration: 700
  }
});

// Add all
tl.add(lineL, lineR, lettersAnim, heart, burst).play();

// Loop like original
setInterval(() => {
  tl.replay();
}, 4200);
</script>

</body>
</html>
